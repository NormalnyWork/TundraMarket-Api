syntax = "proto3";

package order.v1;

option go_package = "tundraMarket/gen/order/v1;orderv1";

import "common/v1/entities.proto";
import "common/v1/enums.proto";

message UserCatalogOut {
  repeated common.v1.Product result = 1;
}

message OrderCreateIn {
  optional int32                  nomad_id = 1;
  optional int32                  trading_station_id = 2;
  repeated common.v1.Location     location = 3;
  repeated common.v1.ProductCount products = 4;
  optional string                 comment = 5;
}

message OrderCreateOut {
  int32 order_id = 1;
}

message OrderCreateForNomadIn {
  string                      nomad_phone = 1;
  repeated common.v1.Location location = 2;
  repeated common.v1.ProductCount products = 3;
  optional string             comment = 4;
}

message OrderCheckStatusIn {
  int64  time = 1; // unix seconds
}

message OrderCheckStatusOut {
  int32                            order_id = 1;
  repeated common.v1.StatusHistory status = 2;
}

message OrderChangeStatusIn {
  int32            order_id = 1;
  common.v1.Status new_status = 2;
  optional string  comment = 3;
}

message OrderChangeStatusOut {
  int64 time = 1; // unix seconds
}

message GetOrderListIn {
  optional int32          anchor = 1;
  int32                   page_size = 2;
  common.v1.OrderCategory order_category = 3;
}

message GetOrderListOut {
  repeated common.v1.Order orders = 1;
}

message GetOrderUpdatesRequest {
  int64  time = 1;  // unix seconds
}

message GetOrderUpdatesResponse {
  repeated common.v1.Order orders = 1;
}
