syntax = "proto3";

package common.v1;

option go_package = "tundraMarket/gen/common/v1;commonv1";

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_PROCESSING  = 1;
  STATUS_SENT        = 2;
  STATUS_COMPLETED   = 3;
  STATUS_CANCELLED   = 4;
  STATUS_DENIED      = 5;
  STATUS_CREATED     = 6;
}

enum OrderCategory {
  ORDER_CATEGORY_NEW        = 0;
  ORDER_CATEGORY_PROCESSING = 1;
  ORDER_CATEGORY_HISTORY    = 2;
}

enum ErrorCode {
  ERROR_INVALID_ID              = 0;
  ERROR_DISTANCE_TOO_FAR        = 1;
  ERROR_EMPTY_CART              = 2;
  ERROR_UNKNOWN_STATUS          = 3;
  ERROR_UNKNOWN_CATEGORY        = 4;
  ERROR_ILLEGAL_STATUS_CHANGE   = 5;
}
