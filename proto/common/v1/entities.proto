syntax = "proto3";

package common.v1;

option go_package = "tundraMarket/gen/common/v1;commonv1";

import "common/v1/enums.proto";

message Location {
  double longitude = 1;
  double latitude = 2;
}

message StatusHistory {
  common.v1.Status status = 1;
  int64            time = 2; // unix seconds
}

message ProductCount {
  int32 id = 1;
  int32 count = 2;
}

message Product {
  int32           id = 1;
  string          name = 2;
  optional string details = 3;
  int32           weight = 4; // gram
  int32           volume = 5; // milliliter
}

message TradingStation {
  int32           id = 1;
  string          name = 2;
  optional string phone = 3;
  Location        location = 4;
}

message Order {
  int32                  id = 1;
  int32                  nomad_id = 2;
  int32                  trading_station_id = 3;
  common.v1.Status       status = 4;
  repeated StatusHistory history = 5;
  string                 comment = 6;
  repeated ProductCount  card = 7;
  Location               location = 8;
}